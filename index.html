<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Editorial — Zucchetti</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;color:#1e1e2e;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:15px}

/* Header */
header{background:#1e1e2e;color:#fff;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.logo{font-size:17px;font-weight:700;letter-spacing:-.5px}
.logo span{color:#60a5fa}
.tabs{display:flex;gap:4px;margin-left:auto}
.tab-btn{padding:6px 16px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;background:transparent;color:rgba(255,255,255,.6);transition:all .15s}
.tab-btn.active,.tab-btn:hover{background:rgba(255,255,255,.12);color:#fff}

/* Toolbar */
.toolbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:10px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.month-nav{display:flex;align-items:center;gap:8px}
.nav-btn{width:30px;height:30px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.nav-btn:hover{background:#f3f4f6}
.month-label{font-size:15px;font-weight:700;min-width:170px;text-align:center}
.right-tools{display:flex;align-items:center;gap:10px;margin-left:auto}
.filter-label{font-size:14px;color:#6b7280}
.filter-select{padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:14px;background:#fff;cursor:pointer;font-family:inherit}
.btn-add{padding:7px 16px;background:#1e1e2e;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-backup{padding:7px 14px;background:none;color:#6b7280;border:1px solid #e5e7eb;border-radius:6px;font-size:13px;cursor:pointer;transition:all .15s}
.btn-backup:hover{background:#f3f4f6;color:#374151}
@media print{header,#monthNav,.right-tools,#sprintView,#listView{display:none!important}.view.hidden{display:block!important}#calendarView{display:block!important}body{overflow:visible;height:auto}}
.btn-add:hover{background:#374151}

/* Views */
.view{flex:1;overflow:auto}
.hidden{display:none!important}

/* Calendar */
.calendar-wrap{padding:16px 24px}
.cal-title{background:#1e1e2e;color:#fff;text-align:center;padding:10px;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:10px 10px 0 0}
.cal-legend{display:flex;justify-content:center;gap:8px;padding:6px 12px;background:#f9fafb;border-left:1px solid #e5e7eb;border-right:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb}
.legend-cell{padding:4px 14px;font-size:12px;font-weight:600;text-align:center;border-radius:20px}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e5e7eb;border:1px solid #e5e7eb;border-radius:0 0 10px 10px;overflow:hidden}
.day-header{background:#1e1e2e;color:#fff;text-align:center;padding:8px;font-size:13px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.day-cell{background:#fff;min-height:110px;padding:6px;cursor:pointer;transition:background .1s;position:relative}
.day-cell:hover{background:#f9fafb}
.day-cell.other-month{background:#fafafa}
.day-cell.other-month .day-num{color:#d1d5db}
.day-num{font-size:14px;font-weight:700;color:#374151;margin-bottom:3px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.day-cell.today .day-num{background:#1e1e2e;color:#fff}
.post-chip{font-size:12px;padding:4px 7px;border-radius:3px;margin-bottom:3px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;transition:opacity .1s;display:block}
.post-chip:hover{opacity:.8}

/* Status colors */
.s-briefing{background:#fef3c7;color:#92400e}
.s-gravar{background:#fde68a;color:#78350f}
.s-concluido{background:#d1fae5;color:#065f46}
.s-aprogramar{background:#dbeafe;color:#1e40af}
.s-empauta{background:#fce7f3;color:#9d174d}

/* Sprint */
.sprint-wrap{padding:16px 24px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.sprint-card{background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb;display:flex;flex-direction:column}
.sprint-hdr{padding:12px 16px;font-size:14px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.5px}
.s1-hdr{background:#d97706}.s2-hdr{background:#7c3aed}.s3-hdr{background:#166534}
.sprint-item{padding:10px 16px;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background .1s}
.sprint-item:hover{background:#f9fafb}
.sprint-item:last-child{border-bottom:none}
.si-linha{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af}
.si-tema{font-size:14px;color:#374151;margin-top:2px;line-height:1.3}
.si-date{font-size:12px;color:#9ca3af;margin-top:3px}
.sprint-empty{padding:24px 16px;text-align:center;color:#9ca3af;font-size:13px}

/* List */
.list-wrap{padding:16px 24px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb}
th{background:#f9fafb;padding:10px 12px;text-align:left;font-size:13px;font-weight:600;color:#6b7280;border-bottom:1px solid #e5e7eb;text-transform:uppercase;letter-spacing:.5px}
td{padding:10px 12px;font-size:14px;border-bottom:1px solid #f3f4f6;color:#374151}
tr:hover td{background:#f9fafb;cursor:pointer}
tr:last-child td{border-bottom:none}
.badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.linha-badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:#f3f4f6;color:#374151}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hdr{padding:20px 24px 16px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700}
.modal-x{background:none;border:none;font-size:22px;cursor:pointer;color:#9ca3af;line-height:1}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.5px}
.fi,.fs{padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;color:#1e1e2e;transition:border-color .15s;font-family:inherit;width:100%}
.fi:focus,.fs:focus{outline:none;border-color:#1e1e2e}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-ftr{padding:16px 24px;border-top:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center}
.btn-del{padding:8px 14px;background:none;border:1px solid #fca5a5;color:#dc2626;border-radius:8px;font-size:13px;cursor:pointer;transition:all .15s}
.btn-del:hover{background:#fee2e2}
.modal-actions{display:flex;gap:8px}
.btn-cancel{padding:8px 14px;background:none;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;cursor:pointer}
.btn-cancel:hover{background:#f3f4f6}
.btn-save{padding:8px 20px;background:#1e1e2e;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}
.btn-save:hover{background:#374151}
</style>
</head>
<body>

<header>
  <div class="logo">Calendário <span>Editorial</span></div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('list')">Lançamentos</button>
    <button class="tab-btn" onclick="switchTab('sprint')">Visão Sprint</button>
    <button class="tab-btn" onclick="switchTab('calendar')">Calendário</button>
  </div>
</header>

<div class="toolbar">
  <div class="month-nav" id="monthNav">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
  </div>
  <div class="right-tools">
    <span class="filter-label">Linha:</span>
    <select class="filter-select" id="filterLine" onchange="render()">
      <option value="Todas">Todas</option>
      <option value="Clipp">Clipp</option>
      <option value="Gdoor">Gdoor</option>
      <option value="Small">Small</option>
      <option value="ZWeb">ZWeb</option>
    </select>
    <button class="btn-add" onclick="openModal()">+ Novo lançamento</button>
    <div style="position:relative;display:inline-block" id="backupMenu">
      <button class="btn-backup" onclick="toggleBackupMenu()">⬇ Backup ▾</button>
      <div id="backupDropdown" style="display:none;position:absolute;right:0;top:110%;background:#fff;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:50;min-width:160px;overflow:hidden">
        <div onclick="exportCSV()" style="padding:10px 16px;font-size:13px;cursor:pointer;color:#374151;border-bottom:1px solid #f3f4f6" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background='#fff'">📊 Excel / CSV</div>
        <div onclick="exportPDF()" style="padding:10px 16px;font-size:13px;cursor:pointer;color:#374151" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background='#fff'">🖨️ PDF</div>
      </div>
    </div>
  </div>
</div>

<div class="view hidden" id="calendarView">
  <div class="calendar-wrap">
    <div class="cal-title" id="calTitle"></div>
    <div class="cal-legend" id="calLegend"></div>
    <div class="calendar-grid" id="calGrid"></div>
  </div>
</div>

<div class="view hidden" id="sprintView">
  <div class="sprint-wrap">
    <div class="sprint-card"><div class="sprint-hdr s1-hdr">Sprint 1 — Briefar</div><div id="sp1"></div></div>
    <div class="sprint-card"><div class="sprint-hdr s2-hdr">Sprint 2 — Em Execução</div><div id="sp2"></div></div>
    <div class="sprint-card"><div class="sprint-hdr s3-hdr">Sprint 3 — Publicar</div><div id="sp3"></div></div>
  </div>
</div>

<div class="view" id="listView">
  <div class="list-wrap">
    <table>
      <thead><tr><th>Data Pub.</th><th>Linha</th><th>Formato</th><th>Editoria</th><th>Tema / Título</th><th>Status</th><th>Sem. Briefing</th></tr></thead>
      <tbody id="listBody"></tbody>
    </table>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modalTitle">Novo Lançamento</div>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="frow">
        <div class="fg"><label class="fl">Linha</label>
          <select class="fs" id="fLinha"><option>Clipp</option><option>Gdoor</option><option>Small</option><option>ZWeb</option></select></div>
        <div class="fg"><label class="fl">Formato</label>
          <select class="fs" id="fFormato"><option>Reels</option><option>Carrossel</option><option>Estático</option></select></div>
      </div>
      <div class="fg"><label class="fl">Editoria</label>
        <select class="fs" id="fEditoria">
          <option>Radar comercial</option>
          <option>Pílula de venda</option>
          <option>GTM</option>
          <option>Solução na prática</option>
          <option>Parcerias que transformam</option>
          <option>Educativo</option>
        </select></div>
      <div class="fg"><label class="fl">Tema / Título</label>
        <input class="fi" type="text" id="fTema" placeholder="Descreva o tema ou título do conteúdo"></div>
      <div class="frow">
        <div class="fg"><label class="fl">Data de Publicação</label>
          <input class="fi" type="date" id="fData"></div>
        <div class="fg"><label class="fl">Status</label>
          <select class="fs" id="fStatus">
            <option>A programar</option><option>Briefing</option><option>Gravar</option><option>Em pauta</option><option>Concluido / Programado</option>
          </select></div>
      </div>
      <div class="fg"><label class="fl">Semana de Briefing</label>
        <input class="fi" type="date" id="fSemBriefing"></div>
    </div>
    <div class="modal-ftr">
      <button class="btn-del hidden" id="btnDel" onclick="deletePost()">Excluir</button>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="savePost()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
let posts = JSON.parse(localStorage.getItem('zuc_posts') || 'null');
let curYear = 2026, curMonth = 6, curTab = 'list', editId = null;

const STATUS_CLS = {
  'Briefing':'s-briefing','Gravar':'s-gravar',
  'Concluido / Programado':'s-concluido',
  'A programar':'s-aprogramar','Em pauta':'s-empauta'
};
const STATUS_STYLE = {
  'Briefing':'background:#fef3c7;color:#92400e',
  'Gravar':'background:#fde68a;color:#78350f',
  'Concluido / Programado':'background:#d1fae5;color:#065f46',
  'A programar':'background:#dbeafe;color:#1e40af',
  'Em pauta':'background:#fce7f3;color:#9d174d'
};
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function save(){ localStorage.setItem('zuc_posts', JSON.stringify(posts)); }
function fmt(s){ if(!s) return '—'; const[y,m,d]=s.split('-'); return `${d}/${m}/${y}`; }

if (!posts) {
  posts = [
    {id:uid(),linha:'Clipp',formato:'Reels',tema:'Como o Clipp facilita o controle do caixa',data:'2026-07-07',status:'Briefing',semBriefing:'2026-06-23'},
    {id:uid(),linha:'Gdoor',formato:'Carrossel',tema:'PDV: 3 erros que custam vendas ao revendedor',data:'2026-07-14',status:'Gravar',semBriefing:'2026-06-30'},
    {id:uid(),linha:'Small',formato:'Reels',tema:'O sistema que cresce com o negócio do cliente',data:'2026-07-21',status:'Briefing',semBriefing:'2026-06-30'},
    {id:uid(),linha:'ZWeb',formato:'Estático',tema:'Presença digital para o comércio local',data:'2026-07-15',status:'A programar',semBriefing:'2026-07-07'},
    {id:uid(),linha:'Clipp',formato:'Carrossel',tema:'Integração com marketplaces: passo a passo',data:'2026-07-22',status:'Em pauta',semBriefing:'2026-07-07'},
    {id:uid(),linha:'Gdoor',formato:'Reels',tema:'Fechamento de caixa sem erro',data:'2026-07-28',status:'Concluido / Programado',semBriefing:'2026-07-14'},
  ];
  save();
}

function filtered(){
  const l = document.getElementById('filterLine').value;
  return l === 'Todas' ? posts : posts.filter(p => p.linha === l);
}

// ── TAB ───────────────────────────────────────────────────────────────────
function toggleBackupMenu(){
  const d = document.getElementById('backupDropdown');
  d.style.display = d.style.display==='none' ? 'block' : 'none';
}
document.addEventListener('click', e=>{
  if(!document.getElementById('backupMenu').contains(e.target))
    document.getElementById('backupDropdown').style.display='none';
});

function exportCSV(){
  document.getElementById('backupDropdown').style.display='none';
  const now = new Date();
  const name = `backup-calendario-${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}.csv`;
  const header = ['Data Publicação','Linha','Formato','Editoria','Tema / Título','Status','Sem. Briefing'];
  const rows = posts.map(p=>[p.data,p.linha,p.formato,p.editoria||'',`"${p.tema}"`,p.status,p.semBriefing||'']);
  const csv = [header, ...rows].map(r=>r.join(';')).join('\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
}

function exportPDF(){
  document.getElementById('backupDropdown').style.display='none';
  window.print();
}

function switchTab(tab){
  curTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['list','sprint','calendar'][i]===tab);
  });
  document.getElementById('calendarView').classList.toggle('hidden', tab!=='calendar');
  document.getElementById('sprintView').classList.toggle('hidden', tab!=='sprint');
  document.getElementById('listView').classList.toggle('hidden', tab!=='list');
  document.getElementById('monthNav').style.visibility = tab==='calendar' ? 'visible' : 'hidden';
  render();
}

// ── MONTH NAV ─────────────────────────────────────────────────────────────
function changeMonth(d){
  curMonth += d;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){
  if(curTab==='calendar') renderCal();
  else if(curTab==='sprint') renderSprint();
  else renderList();
}

// ── STATUS INITIAL ────────────────────────────────────────────────────────
const STATUS_INITIAL = {
  'Briefing':'B','Gravar':'G','Concluido / Programado':'C',
  'A programar':'A','Em pauta':'E'
};

// ── CALENDAR ──────────────────────────────────────────────────────────────
function renderCal(){
  const label = `${MONTHS[curMonth].toUpperCase()}  ${curYear}`;
  document.getElementById('monthLabel').textContent = `${MONTHS[curMonth]}  ${curYear}`;
  document.getElementById('calTitle').textContent = label;

  // Legend
  const legend = document.getElementById('calLegend');
  legend.innerHTML = '';
  const legendItems = [
    {label:'B | Briefing', cls:'s-briefing'},
    {label:'G | Gravar', cls:'s-gravar'},
    {label:'C | Concluído', cls:'s-concluido'},
    {label:'A | A programar', cls:'s-aprogramar'},
    {label:'E | Em pauta', cls:'s-empauta'},
  ];
  legendItems.forEach(item=>{
    const c = document.createElement('div');
    c.className=`legend-cell ${item.cls}`;
    c.textContent=item.label;
    legend.appendChild(c);
  });

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  ['SEGUNDA','TERÇA','QUARTA','QUINTA','SEXTA','SÁBADO','DOMINGO'].forEach(d=>{
    const h = document.createElement('div');
    h.className='day-header'; h.textContent=d; grid.appendChild(h);
  });

  const firstDow = (new Date(curYear,curMonth,1).getDay()+6)%7;
  const daysInMonth = new Date(curYear,curMonth+1,0).getDate();
  const totalCells = Math.ceil((firstDow+daysInMonth)/7)*7;
  const today = new Date().toISOString().slice(0,10);
  const fp = filtered();

  for(let i=0;i<totalCells;i++){
    const offset = i - firstDow;
    const date = new Date(curYear, curMonth, 1+offset);
    const inMonth = date.getMonth()===curMonth;
    const ds = date.toISOString().slice(0,10);

    const cell = document.createElement('div');
    cell.className = 'day-cell'+(inMonth?'':' other-month');
    if(ds===today) cell.classList.add('today');

    const num = document.createElement('div');
    num.className='day-num'; num.textContent=date.getDate();
    cell.appendChild(num);

    fp.filter(p=>p.data===ds).forEach(p=>{
      const chip = document.createElement('div');
      chip.className=`post-chip ${STATUS_CLS[p.status]||''}`;
      const initial = STATUS_INITIAL[p.status]||'?';
      chip.textContent=`${initial} | ${p.formato} | ${p.editoria||''} — ${p.tema}`;
      chip.title=`${p.linha} · ${p.tema}`;
      chip.onclick=(e)=>{e.stopPropagation();openModal(p.id);};
      cell.appendChild(chip);
    });

    if(inMonth) cell.onclick=()=>openModal(null,ds);
    grid.appendChild(cell);
  }
}

// ── SPRINT ────────────────────────────────────────────────────────────────
function renderSprint(){
  const fp = filtered();
  const groups = [
    [fp.filter(p=>['Briefing','A programar'].includes(p.status)),'sp1'],
    [fp.filter(p=>['Gravar','Em pauta'].includes(p.status)),'sp2'],
    [fp.filter(p=>p.status==='Concluido / Programado'),'sp3'],
  ];
  groups.forEach(([items,id])=>{
    const el = document.getElementById(id);
    if(!items.length){ el.innerHTML='<div class="sprint-empty">Sem posts nessa fase</div>'; return; }
    el.innerHTML = items.sort((a,b)=>a.data.localeCompare(b.data)).map(p=>`
      <div class="sprint-item" onclick="openModal('${p.id}')">
        <div class="si-linha">${p.linha} · ${p.formato} · ${p.editoria||''}</div>
        <div class="si-tema">${p.tema}</div>
        <div class="si-date">📅 ${fmt(p.data)}</div>
      </div>`).join('');
  });
}

// ── LIST ──────────────────────────────────────────────────────────────────
function renderList(){
  const fp = filtered().sort((a,b)=>a.data.localeCompare(b.data));
  document.getElementById('listBody').innerHTML = fp.length
    ? fp.map(p=>`<tr onclick="openModal('${p.id}')">
        <td>${fmt(p.data)}</td>
        <td><span class="linha-badge">${p.linha}</span></td>
        <td>${p.formato}</td>
        <td>${p.editoria||'—'}</td>
        <td>${p.tema}</td>
        <td><span class="badge" style="${STATUS_STYLE[p.status]||''}">${p.status}</span></td>
        <td>${fmt(p.semBriefing)}</td>
      </tr>`).join('')
    : '<tr><td colspan="6" style="text-align:center;padding:24px;color:#9ca3af">Nenhum lançamento cadastrado</td></tr>';
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(id=null, preDate=null){
  editId = id;
  const btnDel = document.getElementById('btnDel');
  if(id){
    const p = posts.find(x=>x.id===id); if(!p) return;
    document.getElementById('modalTitle').textContent='Editar Lançamento';
    document.getElementById('fLinha').value=p.linha;
    document.getElementById('fFormato').value=p.formato;
    document.getElementById('fEditoria').value=p.editoria||'Radar comercial';
    document.getElementById('fTema').value=p.tema;
    document.getElementById('fData').value=p.data;
    document.getElementById('fStatus').value=p.status;
    document.getElementById('fSemBriefing').value=p.semBriefing||'';
    btnDel.classList.remove('hidden');
  } else {
    document.getElementById('modalTitle').textContent='Novo Lançamento';
    document.getElementById('fLinha').value='Clipp';
    document.getElementById('fFormato').value='Reels';
    document.getElementById('fEditoria').value='Radar comercial';
    document.getElementById('fTema').value='';
    document.getElementById('fData').value=preDate||'';
    document.getElementById('fStatus').value='A programar';
    document.getElementById('fSemBriefing').value='';
    btnDel.classList.add('hidden');
  }
  document.getElementById('overlay').classList.add('open');
  document.getElementById('fTema').focus();
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  editId=null;
}

function savePost(){
  const tema = document.getElementById('fTema').value.trim();
  const data = document.getElementById('fData').value;
  if(!tema||!data){ alert('Preencha o tema e a data de publicação.'); return; }
  const p = {
    linha:document.getElementById('fLinha').value,
    formato:document.getElementById('fFormato').value,
    editoria:document.getElementById('fEditoria').value,
    tema, data,
    status:document.getElementById('fStatus').value,
    semBriefing:document.getElementById('fSemBriefing').value,
  };
  if(editId){ const i=posts.findIndex(x=>x.id===editId); posts[i]={...posts[i],...p}; }
  else posts.push({id:uid(),...p});
  save(); closeModal(); render();
}

function deletePost(){
  if(!confirm('Excluir este lançamento?')) return;
  posts=posts.filter(p=>p.id!==editId);
  save(); closeModal(); render();
}

document.getElementById('overlay').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

render();
</script>
</body>
</html>
